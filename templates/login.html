<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PGP Web — Unlock</title>
    <link rel="stylesheet" href="/static/dist/styles.css" />
  </head>
  <body class="bg-[#1a1b26] min-h-screen flex items-center justify-center p-4">
    <main class="max-w-sm w-full">
      <div class="bg-[#24283b] rounded-xl border border-[#292e42] p-8">
        <div class="mb-6">
          <pre class="text-[#7aa2f7] text-xs mb-3 select-none">┌──────────────┐
│  ◆  PGP Web  │
└──────────────┘</pre>
          <p class="text-[#565f89] text-sm">Enter master password to continue.</p>
        </div>

        {{if .Error}}
        <div class="mb-4 px-3 py-2 rounded-md bg-[#f7768e]/10 border border-[#f7768e]/20 text-[#f7768e] text-sm">
          {{.Error}}
        </div>
        {{end}}

        <form action="/auth" method="post" class="space-y-4">
          <div>
            <label class="block text-[#565f89] text-xs mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#565f89] text-sm select-none">❯</span>
              <input
                name="password"
                type="password"
                autofocus
                required
                placeholder="••••••••"
                class="w-full bg-[#16161e] border border-[#292e42] rounded-md pl-8 pr-3 py-2.5 text-[#c0caf5] placeholder-[#565f89] text-sm focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] transition-colors"
              />
            </div>
          </div>
          <button
            type="submit"
            class="w-full bg-[#7aa2f7] hover:bg-[#6a92e7] text-[#1a1b26] font-semibold text-sm py-2.5 rounded-md transition-colors"
          >
            Unlock
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
