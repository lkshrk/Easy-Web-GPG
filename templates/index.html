<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PGP Web</title>
    <link rel="stylesheet" href="/static/dist/styles.css" />
  </head>
  <body class="bg-[#1a1b26] min-h-screen text-[#c0caf5]">
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Top bar -->
    <header class="border-b border-[#292e42] px-6 py-3 flex items-center justify-between">
      <div class="flex items-center">
        <img src="/static/img/logo.svg" alt="easy-web-gpg" class="h-10" />
      </div>
      <a href="/logout" class="text-sm font-bold text-[#565f89] hover:text-[#a9b1d6] transition-colors">logout →</a>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8 space-y-8">

      <!-- Key selector -->
      <section class="bg-[#24283b] rounded-lg border border-[#292e42] p-5">
        <label for="key-select" class="block text-xs text-[#565f89] uppercase tracking-wider mb-2">Active Key</label>
        <div class="relative">
          <select id="key-select" class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-2.5 pr-10 text-sm text-[#c0caf5] appearance-none focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] transition-colors">
            <option value="">Select a key...</option>
            {{range .Keys}}
            <option value="{{.ID}}" data-is-private="{{.IsPrivate}}">{{if .IsPrivate}}🔐{{else}}🔒{{end}} {{.Name}}</option>
            {{end}}
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-[#565f89]">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </div>
        <div id="key-badge" class="mt-2.5 hidden">
          <span id="key-badge-label" class="inline-flex items-center gap-1 px-2.5 py-1 rounded text-xs font-medium"></span>
          <span id="key-badge-hint" class="text-xs text-[#565f89] ml-1.5"></span>
        </div>
      </section>

      <!-- Crypto operations -->
      <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div>
          <label for="input-text" class="block text-xs text-[#565f89] uppercase tracking-wider mb-2">Input</label>
          <textarea id="input-text" rows="12" placeholder="Paste plaintext to encrypt, or a PGP message to decrypt..."
            class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-3 text-sm font-mono text-[#c0caf5] placeholder-[#565f89] focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] resize-none transition-colors"></textarea>
        </div>
        <div>
          <label for="output-text" class="block text-xs text-[#565f89] uppercase tracking-wider mb-2">Output</label>
          <textarea id="output-text" rows="12" readonly placeholder="Result will appear here..."
            class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-3 text-sm font-mono text-[#a9b1d6] placeholder-[#565f89] focus:outline-none resize-none"></textarea>
        </div>
      </section>

      <div id="error-msg" role="alert" class="hidden px-4 py-3 rounded-md bg-[#f7768e]/10 border border-[#f7768e]/20 text-sm text-[#f7768e]"></div>

      <div class="flex items-center gap-3">
        <button id="action-btn" type="button" disabled
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-md text-[#1a1b26] text-sm font-semibold transition-all disabled:opacity-40 disabled:cursor-not-allowed bg-[#7aa2f7] hover:bg-[#6a92e7]">
          <span id="action-btn-text">Encrypt</span>
        </button>
        <button id="clear-btn" type="button" class="text-sm text-[#565f89] hover:text-[#a9b1d6] transition-colors">Clear</button>
      </div>

      <!-- Key management -->
      <section class="border-t border-[#292e42] pt-8">
        <h2 class="text-lg font-semibold text-[#bb9af7] mb-6">Key Management</h2>

        <!-- Add key form -->
        <div class="bg-[#24283b] rounded-lg border border-[#292e42] p-5 mb-6">
          <h3 class="text-xs text-[#565f89] uppercase tracking-wider mb-4">Add New Key</h3>
          <form id="add-key-form" action="/keys" method="post" class="space-y-3">
            <div>
              <label for="key-name" class="block text-xs text-[#565f89] mb-1">Name</label>
              <input id="key-name" name="name" required
                class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-2 text-sm text-[#c0caf5] placeholder-[#565f89] focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] transition-colors" />
            </div>
            <div>
              <label for="key-armored" class="block text-xs text-[#565f89] mb-1">Armored PGP Key</label>
              <textarea id="key-armored" name="armored" rows="4" required
                class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-2 text-sm font-mono text-[#c0caf5] placeholder-[#565f89] focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] resize-none transition-colors"></textarea>
            </div>
            <div>
              <label for="key-password" class="block text-xs text-[#565f89] mb-1">Passphrase <span class="text-[#565f89]">(optional — saved for auto-decrypt)</span></label>
              <input id="key-password" name="password" type="password"
                class="w-full bg-[#16161e] border border-[#292e42] rounded-md px-3 py-2 text-sm text-[#c0caf5] focus:outline-none focus:border-[#7aa2f7] focus:ring-1 focus:ring-[#7aa2f7] transition-colors" />
            </div>
            <div>
              <button type="submit"
                class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-[#7aa2f7] hover:bg-[#6a92e7] text-[#1a1b26] text-sm font-semibold transition-colors">
                Add Key
              </button>
            </div>
          </form>
        </div>

        <!-- Stored keys -->
        <div>
          <h3 class="text-xs text-[#565f89] uppercase tracking-wider mb-3">Stored Keys</h3>
          {{range .Keys}}
          <div class="flex items-center justify-between py-3 border-b border-[#292e42] last:border-0 group">
            <div class="flex items-center gap-2.5 min-w-0">
              <span class="text-sm font-medium text-[#c0caf5] truncate">{{.Name}}</span>
              {{if .IsPrivate}}
              <span class="shrink-0 px-2 py-0.5 rounded text-[10px] font-medium bg-[#ff9e64]/15 text-[#ff9e64] border border-[#ff9e64]/25">Private</span>
              {{else}}
              <span class="shrink-0 px-2 py-0.5 rounded text-[10px] font-medium bg-[#9ece6a]/15 text-[#9ece6a] border border-[#9ece6a]/25">Public</span>
              {{end}}
              <span class="text-xs text-[#565f89] truncate">{{.CreatedAt}}</span>
            </div>
            <form method="post" action="/keys/delete" class="shrink-0 ml-3 delete-key-form">
              <input type="hidden" name="id" value="{{.ID}}" />
              <button type="submit"
                class="text-xs text-[#565f89] hover:text-[#f7768e] transition-colors opacity-0 group-hover:opacity-100">Delete</button>
            </form>
          </div>
          {{else}}
          <p class="text-sm text-[#565f89] py-3">No keys stored yet.</p>
          {{end}}
        </div>
      </section>

    </main>

    <script>
    (function() {
      // ── Toast system ──────────────────────────────────────────────────────────
      var toastContainer = document.getElementById('toast-container');

      function showToast(message, type) {
        var isSuccess = type === 'success';
        var toast = document.createElement('div');
        toast.className = [
          'pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-md border text-sm shadow-lg',
          'translate-x-full transition-transform duration-300',
          isSuccess
            ? 'bg-[#9ece6a]/10 border-[#9ece6a]/30 text-[#9ece6a]'
            : 'bg-[#f7768e]/10 border-[#f7768e]/30 text-[#f7768e]'
        ].join(' ');
        toast.style.minWidth = '220px';
        toast.style.maxWidth = '340px';

        var icon = document.createElement('span');
        icon.textContent = isSuccess ? '✓' : '✕';
        icon.className = 'font-bold shrink-0 mt-px';

        var text = document.createElement('span');
        text.textContent = message;
        text.className = 'leading-snug';

        toast.appendChild(icon);
        toast.appendChild(text);
        toastContainer.appendChild(toast);

        // Slide in
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            toast.classList.remove('translate-x-full');
          });
        });

        // Auto-dismiss
        setTimeout(function() {
          toast.classList.add('translate-x-full');
          toast.addEventListener('transitionend', function() { toast.remove(); });
        }, type === 'success' ? 2500 : 4000);
      }

      // ── Crypto operations ─────────────────────────────────────────────────────
      var keySelect = document.getElementById('key-select');
      var badge = document.getElementById('key-badge');
      var badgeLabel = document.getElementById('key-badge-label');
      var badgeHint = document.getElementById('key-badge-hint');
      var inputText = document.getElementById('input-text');
      var outputText = document.getElementById('output-text');
      var actionBtn = document.getElementById('action-btn');
      var actionBtnText = document.getElementById('action-btn-text');
      var clearBtn = document.getElementById('clear-btn');
      var errorMsg = document.getElementById('error-msg');

      var selectedKeyId = '';
      var isPrivateKey = false;
      var isDecryptMode = false;

      function isPGPMessage(text) {
        return text.trimStart().indexOf('-----BEGIN PGP MESSAGE-----') === 0;
      }

      function updateButtonState() {
        var hasKey = selectedKeyId !== '';
        var hasInput = inputText.value.trim() !== '';
        isDecryptMode = isPGPMessage(inputText.value);

        if (isDecryptMode) {
          actionBtnText.textContent = 'Decrypt';
          actionBtn.classList.remove('bg-[#7aa2f7]', 'hover:bg-[#6a92e7]');
          actionBtn.classList.add('bg-[#7dcfff]', 'hover:bg-[#6dbfef]');
        } else {
          actionBtnText.textContent = 'Encrypt';
          actionBtn.classList.remove('bg-[#7dcfff]', 'hover:bg-[#6dbfef]');
          actionBtn.classList.add('bg-[#7aa2f7]', 'hover:bg-[#6a92e7]');
        }

        var canAct = hasKey && hasInput;
        if (isDecryptMode && !isPrivateKey) {
          canAct = false;
          if (hasKey && hasInput) {
            showError('Select a private key to decrypt.');
          }
        } else {
          hideError();
        }
        actionBtn.disabled = !canAct;
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.remove('hidden');
      }

      function hideError() {
        errorMsg.textContent = '';
        errorMsg.classList.add('hidden');
      }

      keySelect.addEventListener('change', function() {
        var opt = this.options[this.selectedIndex];
        selectedKeyId = this.value;
        isPrivateKey = opt.getAttribute('data-is-private') === 'true';

        if (!selectedKeyId) {
          badge.classList.add('hidden');
        } else {
          badge.classList.remove('hidden');
          if (isPrivateKey) {
            badgeLabel.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded text-xs font-medium bg-[#ff9e64]/15 text-[#ff9e64] border border-[#ff9e64]/25';
            badgeLabel.textContent = 'Private Key';
            badgeHint.textContent = 'Can encrypt and decrypt';
          } else {
            badgeLabel.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded text-xs font-medium bg-[#9ece6a]/15 text-[#9ece6a] border border-[#9ece6a]/25';
            badgeLabel.textContent = 'Public Key';
            badgeHint.textContent = 'Can only encrypt';
          }
        }
        updateButtonState();
      });

      inputText.addEventListener('input', updateButtonState);

      actionBtn.addEventListener('click', function() {
        var endpoint = isDecryptMode ? '/decrypt' : '/encrypt';
        actionBtn.disabled = true;
        actionBtnText.textContent = 'Processing...';
        hideError();

        fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ key: selectedKeyId, input: inputText.value })
        })
        .then(function(res) {
          if (!res.ok) return res.text().then(function(t) { throw new Error(t.trim()); });
          return res.text();
        })
        .then(function(text) {
          outputText.value = text;
        })
        .catch(function(err) {
          showError(err.message || 'An error occurred');
        })
        .finally(function() {
          updateButtonState();
        });
      });

      clearBtn.addEventListener('click', function() {
        inputText.value = '';
        outputText.value = '';
        hideError();
        updateButtonState();
      });

      // ── Add key form (fetch, no page nav) ────────────────────────────────────
      var addKeyForm = document.getElementById('add-key-form');
      if (addKeyForm) {
        addKeyForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var submitBtn = addKeyForm.querySelector('[type="submit"]');
          var origText = submitBtn.textContent;
          submitBtn.disabled = true;
          submitBtn.textContent = 'Adding…';

          fetch('/keys', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(new FormData(addKeyForm)),
            redirect: 'manual'
          })
          .then(function(res) {
            // 303 redirect = success; opaqueredirect = followed 303 manually
            if (res.type === 'opaqueredirect' || res.status === 303 || res.ok) {
              showToast('Key added successfully', 'success');
              addKeyForm.reset();
              setTimeout(function() { location.reload(); }, 1200);
            } else {
              return res.text().then(function(t) {
                throw new Error(t.trim() || 'Failed to add key');
              });
            }
          })
          .catch(function(err) {
            showToast(err.message || 'Failed to add key', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = origText;
          });
        });
      }

      // ── Delete key forms (fetch, no page nav) ────────────────────────────────
      document.querySelectorAll('.delete-key-form').forEach(function(form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          if (!confirm('Delete this key?')) return;

          var row = form.closest('[data-key-row]') || form.closest('.flex.items-center.justify-between');
          var keyName = row ? (row.querySelector('.text-sm.font-medium') || {}).textContent : 'key';

          fetch('/keys/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(new FormData(form)),
            redirect: 'manual'
          })
          .then(function(res) {
            if (res.type === 'opaqueredirect' || res.status === 303 || res.ok) {
              showToast((keyName || 'Key') + ' deleted', 'success');
              if (row) {
                row.style.transition = 'opacity 0.25s';
                row.style.opacity = '0';
                setTimeout(function() { row.remove(); }, 250);
              }
            } else {
              return res.text().then(function(t) {
                throw new Error(t.trim() || 'Failed to delete key');
              });
            }
          })
          .catch(function(err) {
            showToast(err.message || 'Failed to delete key', 'error');
          });
        });
      });
    })();
    </script>
  </body>
</html>
