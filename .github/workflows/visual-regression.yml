name: Visual Regression

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  skip_notice:
    if: ${{ (github.event.head_commit && contains(github.event.head_commit.message, '[ui-change]')) || (github.event.commits && contains(toJSON(github.event.commits), '[ui-change]')) }}
    name: Skipped Visual Tests Notice
    runs-on: ubuntu-latest
    steps:
      - name: Log skip reason
        run: echo 'Skipping visual regression tests because commit message contains the [ui-change] tag.'

  visual-test:
    if: ${{ !((github.event.head_commit && contains(github.event.head_commit.message, '[ui-change]')) || (github.event.commits && contains(toJSON(github.event.commits), '[ui-change]'))) }}
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v5
        with:
          path: current

      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          path: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: current/tests/package-lock.json

      - name: Install test dependencies
        working-directory: current/tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: current/tests
        run: npx playwright install --with-deps chromium

      - name: Build main branch Docker image
        if: github.ref != 'refs/heads/main'
        working-directory: main
        run: docker build -t easy-web-gpg:main .

      - name: Build current branch Docker image
        working-directory: current
        run: docker build -t easy-web-gpg:current .

      - name: Start main branch application
        if: github.ref != 'refs/heads/main'
        run: |
          docker run -d \
            --name easy-web-gpg-main \
            -p 8081:8080 \
            -e MASTER_PASSWORD="test-password" \
            easy-web-gpg:main

          # Wait for app to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8081/time > /dev/null 2>&1; then
              echo "Main branch application is ready"
              break
            fi
            echo "Waiting for main branch application... ($i/30)"
            sleep 1
          done
          if ! curl -f http://localhost:8081/time > /dev/null 2>&1; then
            echo "Main branch application failed to start"
            docker logs easy-web-gpg-main
            exit 1
          fi

      - name: Start current branch application
        run: |
          docker run -d \
            --name easy-web-gpg-current \
            -p 8080:8080 \
            -e MASTER_PASSWORD="test-password" \
            easy-web-gpg:current

          # Wait for app to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8080/time > /dev/null 2>&1; then
              echo "Current branch application is ready"
              break
            fi
            echo "Waiting for current branch application... ($i/30)"
            sleep 1
          done
          if ! curl -f http://localhost:8080/time > /dev/null 2>&1; then
            echo "Current branch application failed to start"
            docker logs easy-web-gpg-current
            exit 1
          fi

      - name: Run visual regression tests (comparison mode)
        if: github.ref != 'refs/heads/main'
        working-directory: current/tests
        env:
          BASE_URL: http://localhost:8080
          BASELINE_URL: http://localhost:8081
        run: npm run test:visual

      - name: Run visual regression tests (snapshot mode)
        if: github.ref == 'refs/heads/main'
        working-directory: current/tests
        env:
          BASE_URL: http://localhost:8080
        run: npm run test:visual

      - name: Stop applications
        if: always()
        run: |
          docker logs easy-web-gpg-main || true
          docker stop easy-web-gpg-main || true
          docker rm easy-web-gpg-main || true
          docker logs easy-web-gpg-current || true
          docker stop easy-web-gpg-current || true
          docker rm easy-web-gpg-current || true

      - name: Upload visual comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-${{ github.run_number }}
          path: |
            current/tests/playwright-report/**
            current/tests/test-results/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const artifact_url = `${run_url}#artifacts`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Visual regression tests failed!\n\n[View test results](${run_url})\n[Download report](${artifact_url})\n\nIf these changes are intentional, add \`[ui-change]\` to your commit message.`
            });
