name: Visual Regression

# Run on every push/PR that doesn't touch visual files — confirms changes
# are genuine no-ops (dependency bumps, backend refactors, CI changes, etc.).
# Commits that *do* change templates/CSS skip this workflow entirely.
#
# Baseline: the parent commit (push) or base branch tip (PR).
# This way the comparison is always "did THIS change break the UI?"
# regardless of accumulated visual changes since the last release.
on:
  push:
    branches: ['**']
    paths-ignore:
      - 'templates/**'
      - 'static/css/**'
      - 'static/img/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - 'templates/**'
      - 'static/css/**'
      - 'static/img/**'

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine baseline SHA
        id: baseline
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build baseline image
        run: |
          BASELINE_SHA="${{ steps.baseline.outputs.sha }}"
          if [ "$BASELINE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASELINE_SHA" ]; then
            echo "No parent commit — using current commit as baseline (no regression possible)"
            docker build -t easy-web-gpg:baseline .
          else
            git checkout "$BASELINE_SHA"
            docker build -t easy-web-gpg:baseline .
            git checkout -
          fi

      - name: Build current image
        run: docker build -t easy-web-gpg:current .

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: ./tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./tests
        run: npx playwright install --with-deps chromium

      - name: Start containers
        run: |
          docker run -d --name easy-web-gpg-baseline -p 8081:8080 \
            -e MASTER_PASSWORD=test-password \
            easy-web-gpg:baseline
          docker run -d --name easy-web-gpg-current -p 8080:8080 \
            -e MASTER_PASSWORD=test-password \
            easy-web-gpg:current

      - name: Wait for containers
        run: |
          for port in 8080 8081; do
            for i in {1..30}; do
              if curl -sf http://localhost:$port/ > /dev/null 2>&1; then
                echo "Port $port ready"
                break
              fi
              echo "Waiting for port $port... ($i/30)"
              sleep 1
            done
          done

      - name: Run visual regression tests
        working-directory: ./tests
        env:
          BASELINE_URL: http://localhost:8081
          BASE_URL: http://localhost:8080
        run: npm run test:visual

      - name: Stop containers
        if: always()
        run: |
          docker stop easy-web-gpg-baseline easy-web-gpg-current 2>/dev/null || true
          docker rm easy-web-gpg-baseline easy-web-gpg-current 2>/dev/null || true

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diffs
          path: tests/test-results/
          retention-days: 7
