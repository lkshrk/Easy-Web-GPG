name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: github.event_name != 'pull_request'
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: ./tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./tests
        run: npx playwright install --with-deps chromium

      - name: Build Docker image
        run: docker build -t easy-web-gpg:test .

      - name: Start application container
        run: |
          docker run -d --name easy-web-gpg-test \
            -p 8080:8080 \
            -e MASTER_PASSWORD=test-password \
            easy-web-gpg:test

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application... ($i/30)"
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: ./tests
        env:
          BASE_URL: http://localhost:8080
          MASTER_PASSWORD: test-password
        run: npx playwright test e2e/app.spec.ts --reporter=list

      - name: Stop application
        if: always()
        run: docker stop easy-web-gpg-test || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots
          path: tests/test-results/
          retention-days: 7
