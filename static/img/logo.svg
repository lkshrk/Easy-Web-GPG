  <text x="157" y="80" font-size="38" fill="#7aa2f7" font-weight="500"
        font-family='"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace'>easy-web-gpg</text>
