services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      - MASTER_PASSWORD=${MASTER_PASSWORD:-changeme}
      - CGO_ENABLED=0
    volumes:
      - .:/app
      - ./data:/data
      - /app/tmp
    restart: unless-stopped

  css-watcher:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
    command: sh -c "npx -y tailwindcss@latest -i ./static/css/input.css -o ./static/dist/styles.css --watch"
